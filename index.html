<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07131d">
  <title>Curando Klimaatmonitor</title>
  <style>
    :root {
      --bg: #07131d;
      --panel: #0d1b26;
      --panel-2: #102432;
      --line: rgba(255,255,255,.10);
      --text: #f4f8fb;
      --muted: #9fb0bd;
      --blue: #1687d9;
      --green: #27a55c;
      --ok: #4fd174;
      --warn: #ff9e24;
      --crit: #ff4d57;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(22,135,217,.12), transparent 32%),
        radial-gradient(circle at 90% 0%, rgba(39,165,92,.10), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(100deg, rgba(4,16,27,.96), rgba(7,38,59,.86) 48%, rgba(7,57,39,.80)),
        linear-gradient(135deg, #0c3150, #0d4d3a);
      padding: 26px 28px 22px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .14;
      background-image:
        linear-gradient(90deg, transparent 49%, rgba(255,255,255,.18) 50%, transparent 51%),
        linear-gradient(transparent 49%, rgba(255,255,255,.12) 50%, transparent 51%);
      background-size: 80px 80px;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 1500px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(220px, .8fr) minmax(420px, 2fr) minmax(190px, .65fr);
      gap: 24px;
      align-items: center;
    }

    .brand {
      font-size: clamp(1.55rem, 3vw, 2.55rem);
      font-weight: 800;
      letter-spacing: -.04em;
    }

    .brand span { color: #91d444; }

    .hero-title h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3.5vw, 2.9rem);
      letter-spacing: -.035em;
    }

    .hero-title p {
      margin: 8px 0 0;
      color: #d7e4ec;
      font-size: 1rem;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .meta-chip {
      border: 1px solid var(--line);
      background: rgba(0,0,0,.24);
      border-radius: 10px;
      padding: 9px 12px;
      color: #dce8ef;
      font-size: .9rem;
    }

    .outside-card {
      justify-self: end;
      min-width: 170px;
      text-align: right;
      padding: 15px 17px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(0,0,0,.26);
    }

    .outside-card .icon { font-size: 2rem; }
    .outside-card .value { font-size: 2rem; font-weight: 800; }
    .outside-card .label { color: var(--muted); font-size: .85rem; }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px 24px 40px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-card {
      min-height: 128px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: linear-gradient(145deg, rgba(255,255,255,.055), rgba(255,255,255,.018));
      box-shadow: 0 10px 28px rgba(0,0,0,.16);
      position: relative;
      overflow: hidden;
    }

    .summary-card::after {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 7px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent, var(--blue));
    }

    .summary-card .label {
      color: #c8d5dd;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .summary-card .value {
      font-size: clamp(1.75rem, 3vw, 2.45rem);
      font-weight: 800;
      margin-top: 8px;
    }

    .summary-card .detail {
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.25;
    }

    .locations {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .location {
      border: 1px solid var(--line);
      border-radius: 13px;
      overflow: hidden;
      background: rgba(8,22,32,.84);
      box-shadow: 0 14px 32px rgba(0,0,0,.18);
    }

    .location.herdershove { border-color: rgba(22,135,217,.46); }
    .location.sint-anna { border-color: rgba(39,165,92,.46); }

    .location-header {
      padding: 17px 20px;
      font-size: 1.25rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: .01em;
    }

    .herdershove .location-header {
      background: linear-gradient(90deg, rgba(22,135,217,.30), rgba(22,135,217,.10));
    }

    .sint-anna .location-header {
      background: linear-gradient(90deg, rgba(39,165,92,.31), rgba(39,165,92,.10));
    }

    .department {
      padding: 15px 16px 17px;
      border-top: 1px solid var(--line);
    }

    .department h3 {
      margin: 0 0 11px;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rooms {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
      gap: 9px;
    }

    .room {
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(255,255,255,.035);
      min-height: 104px;
      transition: transform .15s ease, border-color .15s ease;
    }

    .room:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.22);
    }

    .room.ok {
      background: linear-gradient(135deg, rgba(79,209,116,.13), rgba(79,209,116,.045));
      border-color: rgba(79,209,116,.23);
    }

    .room.warn {
      background: linear-gradient(135deg, rgba(255,158,36,.15), rgba(255,158,36,.045));
      border-color: rgba(255,158,36,.30);
    }

    .room.crit {
      background: linear-gradient(135deg, rgba(255,77,87,.18), rgba(255,77,87,.05));
      border-color: rgba(255,77,87,.40);
    }

    .room-name { font-weight: 750; }
    .temp { font-size: 1.45rem; margin: 7px 0 4px; }
    .room.crit .temp { color: var(--crit); font-weight: 800; }

    .status {
      font-size: .86rem;
      font-weight: 650;
    }

    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }
    .status.crit { color: var(--crit); }

    .updated {
      margin-top: 5px;
      color: var(--muted);
      font-size: .74rem;
    }

    .error {
      margin-bottom: 18px;
      padding: 14px;
      border: 1px solid rgba(255,77,87,.55);
      background: rgba(255,77,87,.10);
      border-radius: 10px;
    }

    .loading {
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }

    @media (max-width: 1100px) {
      .hero-inner { grid-template-columns: 1fr; }
      .outside-card { justify-self: start; text-align: left; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .locations { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      .hero { padding: 22px 17px; }
      main { padding: 14px 12px 28px; }
      .summary { grid-template-columns: 1fr 1fr; }
      .summary-card:first-child { grid-column: 1 / -1; }
      .rooms { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 430px) {
      .summary, .rooms { grid-template-columns: 1fr; }
      .summary-card:first-child { grid-column: auto; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="brand"><span>●</span> curando</div>

      <div class="hero-title">
        <h1>CURANDO KLIMAATMONITOR</h1>
        <p>Live overzicht op basis van de recentste meting per ruimte</p>
        <div class="hero-meta">
          <div class="meta-chip">◷ Laatste update: <span id="hero-update">gegevens laden…</span></div>
          <div class="meta-chip">⟳ Automatische verversing elke 5 minuten</div>
        </div>
      </div>

      <div class="outside-card">
        <div class="icon">☀️</div>
        <div class="value" id="outside-temp">—</div>
        <div class="label">Buitentemperatuur</div>
      </div>
    </div>
  </header>

  <main>
    <div id="error"></div>
    <div id="summary" class="summary"></div>
    <div id="content" class="loading">Gegevens laden…</div>
  </main>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRCYp9O1teedA7Xnv1zz35P_jWyqNkCmawv6L5DFKvoWqJTB_OdR6Z0uuA2D8fsH67FvWM5UxHpZgjH/pub?gid=887533477&single=true&output=csv";

    function parseCSV(text) {
      const rows = [];
      let row = [], field = "", quoted = false;

      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (c === '"') {
          if (quoted && next === '"') {
            field += '"';
            i++;
          } else {
            quoted = !quoted;
          }
        } else if (c === "," && !quoted) {
          row.push(field);
          field = "";
        } else if ((c === "\n" || c === "\r") && !quoted) {
          if (c === "\r" && next === "\n") i++;
          row.push(field);
          if (row.some(v => v !== "")) rows.push(row);
          row = [];
          field = "";
        } else {
          field += c;
        }
      }

      if (field || row.length) {
        row.push(field);
        rows.push(row);
      }

      return rows;
    }

    function normalizeNumber(value) {
      return Number(String(value).replace(",", "."));
    }

    function statusClass(temp) {
      if (temp >= 28) return "crit";
      if (temp >= 26) return "warn";
      return "ok";
    }

    function statusLabel(temp) {
      if (temp >= 28) return "● Kritiek";
      if (temp >= 26) return "● Hoog risico";
      return "● OK";
    }

    function parseDate(value) {
      if (!value) return new Date(0);

      const iso = new Date(value);
      if (!isNaN(iso)) return iso;

      const match = value.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4}).*?(\d{1,2}):(\d{2})/);
      if (match) {
        return new Date(+match[3], +match[2] - 1, +match[1], +match[4], +match[5]);
      }

      return new Date(0);
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function locationClass(name) {
      return name.toLowerCase().includes("sint") ? "sint-anna" : "herdershove";
    }

    function displayLocation(name) {
      if (name.toLowerCase().includes("sint")) return "WZC SINT-ANNA";
      if (name.toLowerCase().includes("herders")) return "WZC HERDERSHOVE";
      return name.toUpperCase();
    }

    async function loadData() {
      try {
        const response = await fetch(CSV_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const text = await response.text();
        const parsed = parseCSV(text);

        if (parsed.length < 2) {
          throw new Error("Het werkblad bevat nog geen gegevens.");
        }

        const headers = parsed[0].map(h => h.trim());
        const required = ["created", "Locatie", "Afdeling", "Ruimte", "Temperatuur"];
        const missing = required.filter(h => !headers.includes(h));

        if (missing.length) {
          throw new Error("Ontbrekende kolommen: " + missing.join(", "));
        }

        const records = parsed.slice(1).map(row => {
          const obj = {};
          headers.forEach((h, i) => obj[h] = row[i] ?? "");
          obj._temp = normalizeNumber(obj.Temperatuur);
          obj._date = parseDate(obj.created);
          return obj;
        }).filter(r =>
          r.Locatie &&
          r.Afdeling &&
          r.Ruimte &&
          Number.isFinite(r._temp)
        );

        const latest = new Map();

        for (const row of records) {
          const key = `${row.Locatie}|${row.Afdeling}|${row.Ruimte}`;
          const previous = latest.get(key);

          if (!previous || row._date > previous._date) {
            latest.set(key, row);
          }
        }

        render([...latest.values()]);
      } catch (error) {
        document.getElementById("error").innerHTML =
          `<div class="error"><strong>Gegevens konden niet worden geladen.</strong><br>${escapeHTML(error.message)}</div>`;
        document.getElementById("content").innerHTML = "";
      }
    }

    function render(rows) {
      rows.sort((a, b) =>
        a.Locatie.localeCompare(b.Locatie) ||
        a.Afdeling.localeCompare(b.Afdeling) ||
        b._temp - a._temp
      );

      const critical = rows.filter(r => r._temp >= 28).length;
      const warning = rows.filter(r => r._temp >= 26 && r._temp < 28).length;
      const ok = rows.filter(r => r._temp < 26).length;
      const hottest = [...rows].sort((a, b) => b._temp - a._temp)[0];
      const newest = [...rows].sort((a, b) => b._date - a._date)[0];
      const outdoor = rows
        .filter(r => r.Afdeling.toLowerCase() === "buiten")
        .sort((a, b) => b._date - a._date)[0];

      const newestLabel = newest && newest._date.getTime()
        ? newest._date.toLocaleString("nl-BE")
        : "Onbekend";

      document.getElementById("hero-update").textContent = newestLabel;
      document.getElementById("outside-temp").textContent =
        outdoor ? `${outdoor._temp.toFixed(1)}°C` : "—";

      document.getElementById("summary").innerHTML = `
        <div class="summary-card" style="--accent: var(--crit)">
          <div class="label">Warmste ruimte</div>
          <div class="value" style="color:var(--crit)">${hottest ? hottest._temp.toFixed(1) + "°C" : "—"}</div>
          <div class="detail">${hottest ? escapeHTML(hottest.Afdeling + " · " + hottest.Ruimte + "<br>" + displayLocation(hottest.Locatie)) : ""}</div>
        </div>
        <div class="summary-card" style="--accent: var(--crit)">
          <div class="label">Kritiek</div>
          <div class="value">${critical}</div>
          <div class="detail">ruimtes</div>
        </div>
        <div class="summary-card" style="--accent: var(--warn)">
          <div class="label">Hoog risico</div>
          <div class="value">${warning}</div>
          <div class="detail">ruimtes</div>
        </div>
        <div class="summary-card" style="--accent: var(--ok)">
          <div class="label">OK</div>
          <div class="value">${ok}</div>
          <div class="detail">ruimtes</div>
        </div>
        <div class="summary-card" style="--accent: var(--blue)">
          <div class="label">Totaal ruimtes</div>
          <div class="value">${rows.length}</div>
          <div class="detail">gemonitord</div>
        </div>
      `;

      const grouped = {};

      for (const row of rows) {
        grouped[row.Locatie] ??= {};
        grouped[row.Locatie][row.Afdeling] ??= [];
        grouped[row.Locatie][row.Afdeling].push(row);
      }

      const orderedLocations = Object.entries(grouped).sort(([a], [b]) => {
        const aSint = a.toLowerCase().includes("sint");
        const bSint = b.toLowerCase().includes("sint");
        return Number(aSint) - Number(bSint);
      });

      let html = '<div class="locations">';

      for (const [location, departments] of orderedLocations) {
        html += `
          <section class="location ${locationClass(location)}">
            <div class="location-header">🏢 ${escapeHTML(displayLocation(location))}</div>`;

        for (const [department, rooms] of Object.entries(departments)) {
          html += `
            <div class="department">
              <h3>⌂ ${escapeHTML(department)}</h3>
              <div class="rooms">`;

          for (const room of rooms) {
            const cls = statusClass(room._temp);
            html += `
              <div class="room ${cls}">
                <div class="room-name">${escapeHTML(room.Ruimte)}</div>
                <div class="temp">${room._temp.toFixed(1)}°C</div>
                <div class="status ${cls}">${statusLabel(room._temp)}</div>
                <div class="updated">${room._date.getTime() ? room._date.toLocaleString("nl-BE") : ""}</div>
              </div>`;
          }

          html += "</div></div>";
        }

        html += "</section>";
      }

      html += "</div>";

      document.getElementById("content").className = "";
      document.getElementById("content").innerHTML = html;
    }

    loadData();
    setInterval(loadData, 5 * 60 * 1000);
  </script>
</body>
</html>
