<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07131d">
  <title>Curando Klimaatmonitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #07131d;
      --panel: #0d1b26;
      --panel-2: #102432;
      --line: rgba(255,255,255,.10);
      --text: #f4f8fb;
      --muted: #9fb0bd;
      --blue: #1687d9;
      --green: #27a55c;
      --ok: #4fd174;
      --warn: #ff9e24;
      --crit: #ff4d57;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(22,135,217,.12), transparent 32%),
        radial-gradient(circle at 90% 0%, rgba(39,165,92,.10), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: linear-gradient(100deg, rgba(4,16,27,.98), rgba(7,38,59,.92), rgba(7,57,39,.88));
      padding: 26px 24px 22px;
    }
    .header-inner {
      max-width: 1500px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.9rem, 4vw, 3.2rem);
      letter-spacing: -.035em;
    }
    .subtitle { color: #d7e4ec; margin-top: 8px; }
    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .chip {
      border: 1px solid var(--line);
      background: rgba(0,0,0,.24);
      border-radius: 10px;
      padding: 9px 12px;
      color: #dce8ef;
      font-size: .9rem;
    }
    .outside {
      min-width: 180px;
      text-align: right;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(0,0,0,.25);
    }
    .outside .value { font-size: 2rem; font-weight: 800; }
    .outside .label { color: var(--muted); font-size: .85rem; }
    main { max-width: 1500px; margin: 0 auto; padding: 18px 24px 40px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(0,1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .summary-card {
      min-height: 126px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: linear-gradient(145deg, rgba(255,255,255,.055), rgba(255,255,255,.018));
      position: relative;
      overflow: hidden;
    }
    .summary-card::after {
      content: "";
      position: absolute;
      left: 16px; right: 16px; bottom: 7px;
      height: 3px; border-radius: 999px;
      background: var(--accent, var(--blue));
    }
    .summary-card .label {
      color: #c8d5dd;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .summary-card .value {
      font-size: clamp(1.8rem, 3vw, 2.45rem);
      font-weight: 800;
      margin-top: 8px;
    }
    .summary-card .detail { color: var(--muted); margin-top: 3px; }
    .site {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 18px;
      background: rgba(8,22,32,.86);
      box-shadow: 0 14px 32px rgba(0,0,0,.18);
    }
    .site-banner {
      width: 100%;
      display: block;
      aspect-ratio: 1307 / 181;
      object-fit: cover;
      background: #0b2742;
    }
    .site-content { padding: 16px; }
    .department {
      padding: 14px 0 18px;
      border-bottom: 1px solid var(--line);
    }
    .department:last-child { border-bottom: 0; }
    .department h2 {
      margin: 0 0 11px;
      font-size: 1.08rem;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .department small { color: var(--muted); font-weight: 400; }
    .rooms {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
      gap: 10px;
    }
    .room {
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 10px;
      min-height: 108px;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease;
    }
    .room:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.24); }
    .room.ok {
      background: linear-gradient(135deg, rgba(79,209,116,.13), rgba(79,209,116,.045));
      border-color: rgba(79,209,116,.24);
    }
    .room.warn {
      background: linear-gradient(135deg, rgba(255,158,36,.15), rgba(255,158,36,.045));
      border-color: rgba(255,158,36,.30);
    }
    .room.crit {
      background: linear-gradient(135deg, rgba(255,77,87,.18), rgba(255,77,87,.05));
      border-color: rgba(255,77,87,.40);
    }
    .room-name { font-weight: 750; }
    .temp { font-size: 1.45rem; margin: 7px 0 4px; }
    .room.crit .temp { color: var(--crit); font-weight: 800; }
    .status { font-size: .86rem; font-weight: 650; }
    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }
    .status.crit { color: var(--crit); }
    .updated { margin-top: 5px; color: var(--muted); font-size: .74rem; }
    .hint { color: var(--muted); font-size: .8rem; margin-top: 7px; }
    .error {
      padding: 14px; margin-bottom: 18px;
      border: 1px solid rgba(255,77,87,.55);
      background: rgba(255,77,87,.10);
      border-radius: 10px;
    }
    .loading { color: var(--muted); text-align: center; padding: 40px; }
    .modal {
      position: fixed; inset: 0;
      display: none; align-items: center; justify-content: center;
      padding: 20px; background: rgba(0,0,0,.72);
      z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-card {
      width: min(980px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #0c1b27;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
    }
    .modal-head {
      display: flex; justify-content: space-between; gap: 18px;
      align-items: start; padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }
    .modal-head h2 { margin: 0; }
    .modal-head p { margin: 6px 0 0; color: var(--muted); }
    .close {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: white; border-radius: 9px;
      font-size: 1.25rem; width: 38px; height: 38px;
      cursor: pointer;
    }
    .modal-body { padding: 18px 20px 22px; }
    .range-buttons {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
    }
    .range-buttons button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: white; border-radius: 8px;
      padding: 8px 11px; cursor: pointer;
    }
    .range-buttons button.active { background: rgba(22,135,217,.25); border-color: rgba(22,135,217,.65); }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 10px; margin: 14px 0 18px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: rgba(255,255,255,.035);
    }
    .stat .label { color: var(--muted); font-size: .8rem; }
    .stat .value { margin-top: 5px; font-size: 1.35rem; font-weight: 800; }
    .chart-wrap { height: 420px; }
    @media (max-width: 1000px) {
      .summary { grid-template-columns: repeat(2,1fr); }
      .header-inner { grid-template-columns: 1fr; }
      .outside { text-align:left; }
    }
    @media (max-width: 620px) {
      main { padding: 14px 12px 28px; }
      header { padding: 22px 16px; }
      .summary { grid-template-columns: 1fr 1fr; }
      .summary-card:first-child { grid-column: 1 / -1; }
      .rooms { grid-template-columns: 1fr 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .chart-wrap { height: 320px; }
    }
    @media (max-width: 430px) {
      .summary, .rooms, .stats { grid-template-columns: 1fr; }
      .summary-card:first-child { grid-column: auto; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1>CURANDO KLIMAATMONITOR</h1>
      <div class="subtitle">Live overzicht en historiek van de temperatuurmetingen</div>
      <div class="meta">
        <div class="chip">◷ Laatste update: <span id="hero-update">gegevens laden…</span></div>
        <div class="chip">⟳ Automatische verversing elke 5 minuten</div>
        <div class="chip">📈 Klik op een ruimte voor historiek</div>
      </div>
    </div>
    <div class="outside">
      <div style="font-size:2rem">☀️</div>
      <div class="value" id="outside-temp">—</div>
      <div class="label">Buitentemperatuur Herdershove</div>
    </div>
  </div>
</header>

<main>
  <div id="error"></div>
  <div id="summary" class="summary"></div>
  <div id="content" class="loading">Gegevens laden…</div>
</main>

<div id="history-modal" class="modal" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-head">
      <div>
        <h2 id="modal-title">Historiek</h2>
        <p id="modal-subtitle"></p>
      </div>
      <button class="close" id="modal-close" aria-label="Sluiten">×</button>
    </div>
    <div class="modal-body">
      <div class="range-buttons">
        <button data-hours="24" class="active">24 uur</button>
        <button data-hours="72">3 dagen</button>
        <button data-hours="168">7 dagen</button>
        <button data-hours="720">30 dagen</button>
        <button data-hours="0">Alles</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="label">Huidig</div><div class="value" id="stat-current">—</div></div>
        <div class="stat"><div class="label">Minimum</div><div class="value" id="stat-min">—</div></div>
        <div class="stat"><div class="label">Maximum</div><div class="value" id="stat-max">—</div></div>
        <div class="stat"><div class="label">Gemiddelde</div><div class="value" id="stat-avg">—</div></div>
      </div>
      <div class="chart-wrap"><canvas id="history-chart"></canvas></div>
    </div>
  </div>
</div>

let allRecords = [];
let currentSeriesKey = null;
let currentRangeHours = 24;
let historyChart = null;

function parseCSV(text) {
  const rows = [];
  let row = [], field = "", quoted = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (c === '"') {
      if (quoted && next === '"') { field += '"'; i++; }
      else quoted = !quoted;
    } else if (c === "," && !quoted) {
      row.push(field); field = "";
    } else if ((c === "\n" || c === "\r") && !quoted) {
      if (c === "\r" && next === "\n") i++;
      row.push(field);
      if (row.some(v => v !== "")) rows.push(row);
      row = []; field = "";
    } else field += c;
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function normalizeNumber(v) { return Number(String(v).replace(",", ".")); }
function statusClass(t) { return t >= 28 ? "crit" : t >= 26 ? "warn" : "ok"; }
function statusLabel(t) { return t >= 28 ? "● Kritiek" : t >= 26 ? "● Hoog risico" : "● OK"; }
function escapeHTML(v) {
  return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}
function parseDate(v) {
  if (!v) return new Date(0);
  const d = new Date(v);
  if (!isNaN(d)) return d;
  const m = v.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4}).*?(\d{1,2}):(\d{2})/);
  return m ? new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5]) : new Date(0);
}
function keyOf(r) { return `${r.Locatie}|${r.Afdeling}|${r.Ruimte}`; }

async function loadData() {
  try {
    const response = await fetch(CSV_URL, { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const parsed = parseCSV(await response.text());
    if (parsed.length < 2) throw new Error("Het werkblad bevat nog geen gegevens.");
    const headers = parsed[0].map(h => h.trim());
    const required = ["created","Locatie","Afdeling","Ruimte","Temperatuur"];
    const missing = required.filter(h => !headers.includes(h));
    if (missing.length) throw new Error("Ontbrekende kolommen: " + missing.join(", "));
    allRecords = parsed.slice(1).map(row => {
      const o = {};
      headers.forEach((h,i) => o[h] = row[i] ?? "");
      o._temp = normalizeNumber(o.Temperatuur);
      o._date = parseDate(o.created);
      return o;
    }).filter(r => r.Locatie && r.Afdeling && r.Ruimte && Number.isFinite(r._temp) && r._date.getTime());
    renderDashboard();
  } catch (error) {
    document.getElementById("error").innerHTML =
      `<div class="error"><strong>Gegevens konden niet worden geladen.</strong><br>${escapeHTML(error.message)}</div>`;
    document.getElementById("content").innerHTML = "";
  }
}

function renderDashboard() {
  const latestMap = new Map();
  for (const row of allRecords) {
    const k = keyOf(row), prev = latestMap.get(k);
    if (!prev || row._date > prev._date) latestMap.set(k,row);
  }
  const rows = [...latestMap.values()].sort((a,b) =>
    a.Locatie.localeCompare(b.Locatie) || a.Afdeling.localeCompare(b.Afdeling) || b._temp-a._temp
  );
  const critical = rows.filter(r => r._temp >= 28).length;
  const warning = rows.filter(r => r._temp >= 26 && r._temp < 28).length;
  const ok = rows.filter(r => r._temp < 26).length;
  const hottest = [...rows].sort((a,b) => b._temp-a._temp)[0];
  const newest = [...rows].sort((a,b) => b._date-a._date)[0];
  const outside = rows.find(r => r.Locatie === "Herdershove" && r.Afdeling.toLowerCase() === "buiten");

  document.getElementById("hero-update").textContent = newest ? newest._date.toLocaleString("nl-BE") : "Onbekend";
  document.getElementById("outside-temp").textContent = outside ? outside._temp.toFixed(1)+"°C" : "—";

  document.getElementById("summary").innerHTML = `
    <div class="summary-card" style="--accent:var(--crit)">
      <div class="label">Warmste ruimte</div>
      <div class="value" style="color:var(--crit)">${hottest ? hottest._temp.toFixed(1)+"°C" : "—"}</div>
      <div class="detail">${hottest ? escapeHTML(hottest.Locatie+" · "+hottest.Afdeling+" · "+hottest.Ruimte) : ""}</div>
    </div>
    <div class="summary-card" style="--accent:var(--crit)"><div class="label">Kritiek</div><div class="value">${critical}</div><div class="detail">ruimtes</div></div>
    <div class="summary-card" style="--accent:var(--warn)"><div class="label">Hoog risico</div><div class="value">${warning}</div><div class="detail">ruimtes</div></div>
    <div class="summary-card" style="--accent:var(--ok)"><div class="label">OK</div><div class="value">${ok}</div><div class="detail">ruimtes</div></div>
    <div class="summary-card" style="--accent:var(--blue)"><div class="label">Totaal ruimtes</div><div class="value">${rows.length}</div><div class="detail">gemonitord</div></div>`;

  const grouped = {};
  for (const row of rows) {
    grouped[row.Locatie] ??= {};
    grouped[row.Locatie][row.Afdeling] ??= [];
    grouped[row.Locatie][row.Afdeling].push(row);
  }

  const order = ["Herdershove","Sint-Anna"];
  let html = "";
  for (const loc of order) {
    if (!grouped[loc]) continue;
    html += `<section class="site">
      <img class="site-banner" src="${BANNERS[loc]}" alt="${escapeHTML(loc)}">
      <div class="site-content">`;
    for (const [department, rooms] of Object.entries(grouped[loc])) {
      const avg = rooms.reduce((s,r)=>s+r._temp,0)/rooms.length;
      html += `<div class="department">
        <h2><span>${escapeHTML(department)}</span><small>Gemiddeld ${avg.toFixed(1)}°C</small></h2>
        <div class="rooms">`;
      for (const room of rooms) {
        const cls = statusClass(room._temp);
        html += `<div class="room ${cls}" data-key="${escapeHTML(keyOf(room))}">
          <div class="room-name">${escapeHTML(room.Ruimte)}</div>
          <div class="temp">${room._temp.toFixed(1)}°C</div>
          <div class="status ${cls}">${statusLabel(room._temp)}</div>
          <div class="updated">${room._date.toLocaleString("nl-BE")}</div>
          <div class="hint">Klik voor historiek</div>
        </div>`;
      }
      html += `</div></div>`;
    }
    html += `</div></section>`;
  }
  document.getElementById("content").className = "";
  document.getElementById("content").innerHTML = html;

  document.querySelectorAll(".room[data-key]").forEach(el => {
    el.addEventListener("click", () => openHistory(el.dataset.key));
  });
}

function openHistory(key) {
  currentSeriesKey = key;
  currentRangeHours = 24;
  document.querySelectorAll(".range-buttons button").forEach(b => b.classList.toggle("active", b.dataset.hours === "24"));
  const [loc, afd, ruimte] = key.split("|");
  document.getElementById("modal-title").textContent = ruimte;
  document.getElementById("modal-subtitle").textContent = `${loc} · ${afd}`;
  document.getElementById("history-modal").classList.add("open");
  renderHistory();
}

function renderHistory() {
  let series = allRecords.filter(r => keyOf(r) === currentSeriesKey).sort((a,b)=>a._date-b._date);
  if (currentRangeHours > 0 && series.length) {
    const cutoff = new Date(series[series.length-1]._date.getTime() - currentRangeHours*3600*1000);
    series = series.filter(r => r._date >= cutoff);
  }
  if (!series.length) return;

  const temps = series.map(r=>r._temp);
  const current = temps[temps.length-1];
  const min = Math.min(...temps), max = Math.max(...temps), avg = temps.reduce((a,b)=>a+b,0)/temps.length;
  document.getElementById("stat-current").textContent = current.toFixed(1)+"°C";
  document.getElementById("stat-min").textContent = min.toFixed(1)+"°C";
  document.getElementById("stat-max").textContent = max.toFixed(1)+"°C";
  document.getElementById("stat-avg").textContent = avg.toFixed(1)+"°C";

  const labels = series.map(r => r._date.toLocaleString("nl-BE", {
    day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit"
  }));
  const data = temps;

  if (historyChart) historyChart.destroy();
  const ctx = document.getElementById("history-chart");
  historyChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Temperatuur °C",
        data,
        borderColor: "#48a8ff",
        backgroundColor: "rgba(72,168,255,.12)",
        fill: true,
        tension: .28,
        pointRadius: 2,
        pointHoverRadius: 5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { labels: { color: "#dfeaf0" } },
        tooltip: { callbacks: { label: ctx => `${ctx.parsed.y.toFixed(1)}°C` } }
      },
      scales: {
        x: {
          ticks: { color: "#9fb0bd", maxRotation: 0, autoSkip: true, maxTicksLimit: 10 },
          grid: { color: "rgba(255,255,255,.06)" }
        },
        y: {
          ticks: { color: "#9fb0bd", callback: v => v+"°C" },
          grid: { color: "rgba(255,255,255,.08)" },
          suggestedMin: Math.floor(min-1),
          suggestedMax: Math.ceil(max+1)
        }
      }
    }
  });
}

document.getElementById("modal-close").addEventListener("click", () => document.getElementById("history-modal").classList.remove("open"));
document.getElementById("history-modal").addEventListener("click", e => {
  if (e.target.id === "history-modal") e.currentTarget.classList.remove("open");
});
document.querySelectorAll(".range-buttons button").forEach(btn => {
  btn.addEventListener("click", () => {
    currentRangeHours = Number(btn.dataset.hours);
    document.querySelectorAll(".range-buttons button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderHistory();
  });
});

loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
